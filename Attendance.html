<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJC 西區音樂會 - 16大詩班影像收集系統</title>
    
    <!-- 載入 Tailwind CSS (極速排版引擎) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

    <!-- 頂部官方導覽列 -->
    <header class="bg-indigo-950 text-white shadow-lg shrink-0">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center p-0.5 shadow-md">
                    <img src="百週年.png" alt="100" class="w-full h-full object-contain" onerror="this.outerHTML='<span class=\'text-indigo-950 font-black text-xs\'>100th</span>'" />
                </div>
                <div>
                    <p class="text-[10px] font-black uppercase text-indigo-300 tracking-[0.2em] leading-none mb-1">TJC Western District Centennial</p>
                    <h1 class="text-lg font-black leading-tight">西區16獻詩單位 - 影音資料收集與導覽系統</h1>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-[10px] bg-amber-500/20 text-amber-300 px-3 py-1.5 rounded-full border border-amber-500/30 font-bold">公關宣傳組 專屬分流系統</span>
            </div>
        </div>
    </header>

    <!-- 主區塊 -->
    <main class="max-w-7xl mx-auto w-full px-6 py-8 flex-grow grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- 左側：16大詩班聯絡清單 (5列寬) -->
        <section class="lg:col-span-5 bg-white rounded-[2rem] shadow-xl border border-slate-100 flex flex-col h-[650px] overflow-hidden">
            <div class="p-6 bg-slate-900 text-white shrink-0">
                <h3 class="font-black text-base flex items-center gap-2">
                    <!-- Users Icon -->
                    <svg class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                    西區參獻詩班名冊 (共16大單位)
                </h3>
                <p class="text-[10px] text-slate-400 mt-1 font-bold">點選詩班查看幹部名單與提交影音資料</p>
                
                <!-- 簡易搜尋欄 -->
                <div class="mt-4 relative">
                    <input id="search-input" oninput="filterChoirs()" type="text" placeholder="搜尋小區、詩班或人員..." class="w-full bg-white/10 border border-white/10 rounded-xl px-4 py-2 text-xs text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                </div>
            </div>

            <!-- 16大詩班滾動清單 -->
            <div id="choir-list" class="flex-grow overflow-y-auto p-4 space-y-2 custom-scrollbar bg-slate-50/50">
                <!-- 由 JavaScript 動態生成 -->
            </div>
        </section>

        <!-- 右側：詩班詳細資訊與提交系統 (7列寬) -->
        <section class="lg:col-span-7 flex flex-col gap-6">
            
            <!-- 進度追蹤器看板 -->
            <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-100 grid grid-cols-3 gap-4 shrink-0">
                <div class="text-center p-3 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="text-2xl font-black text-indigo-600">16</div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase mt-1">參獻總單位</div>
                </div>
                <div class="text-center p-3 bg-emerald-50 rounded-2xl border border-emerald-100">
                    <div id="count-submitted" class="text-2xl font-black text-emerald-600">0</div>
                    <div class="text-[10px] text-emerald-500 font-bold uppercase mt-1">已提交影像</div>
                </div>
                <div class="text-center p-3 bg-amber-50 rounded-2xl border border-amber-100">
                    <div id="count-pending" class="text-2xl font-black text-amber-600">16</div>
                    <div class="text-[10px] text-amber-500 font-bold uppercase mt-1">待提交單位</div>
                </div>
            </div>

            <!-- 詳細資訊面板 -->
            <div id="detail-panel" class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 p-8 flex-grow flex flex-col justify-center items-center text-center">
                <!-- 預設提示畫面 -->
                <div class="max-w-sm">
                    <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                        <!-- Music Icon -->
                        <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" /></svg>
                    </div>
                    <h4 class="text-lg font-black text-slate-800">請選取獻詩單位</h4>
                    <p class="text-xs text-slate-400 mt-3 leading-relaxed font-medium">
                        選擇左側名冊中的詩班，即可檢視幹部編制，並取得專屬的練詩影音上傳入口。
                    </p>
                </div>
            </div>
        </section>

    </main>

    <!-- 頁尾宣告 -->
    <footer class="bg-slate-900 text-slate-500 text-[10px] text-center py-4 border-t border-slate-800 shrink-0">
        TJC Western District Centennial Music Concert PR Group © 2026. All Rights Reserved.
    </footer>

    <!-- JavaScript 核心控制 (0秒延遲啟動) -->
    <script>
        // 1. 強制隱藏啟動畫面
        const loader = document.getElementById('launch-loader');
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 300);
        }

        // 2. 16大詩班完整真實數據 (源自 Excel)
        const choirs = [
            { id: 1, zone: "復興小區", note: "前山牧區", name: "復興小區前山聯合詩班", leader: "林茜葦", email: "saum0523@gmail.com", conductor: "王鴻志", pianist: "陳 箴 / 孔思恩", status: "pending" },
            { id: 2, zone: "復興小區", note: "中山牧區", name: "復興小區中山聯合兒童詩班", leader: "胡燕琳", email: "", conductor: "胡燕琳", pianist: "陳齊揚", status: "pending" },
            { id: 3, zone: "復興小區", note: "後山牧區", name: "復興小區後山職務人員聯合詩班", leader: "未提供", email: "", conductor: "田恩惠", pianist: "林月霞", status: "pending" },
            { id: 4, zone: "竹苗小區", note: "尖石前山", name: "尖石前山聯合詩班", leader: "未提供", email: "", conductor: "徐慈敏", pianist: "徐 臻", status: "pending" },
            { id: 5, zone: "竹苗小區", note: "尖石後山", name: "尖石後山聯合詩班", leader: "未提供", email: "", conductor: "未提供", pianist: "未提供", status: "pending" },
            { id: 6, zone: "竹苗小區", note: "五峰牧區", name: "五峰線綜合詩班", leader: "蘇志成", email: "", conductor: "黃欣茹", pianist: "張立揚", status: "pending" },
            { id: 7, zone: "竹苗小區", note: "中港溪", name: "中港溪聯合詩班", leader: "未提供", email: "", conductor: "未提供", pianist: "未提供", status: "pending" },
            { id: 8, zone: "中苗小區", note: "東達牧區", name: "東達牧區聯合詩班", leader: "陳寧", email: "", conductor: "胡致念", pianist: "張紫芸", status: "pending" },
            { id: 9, zone: "中苗小區", note: "泰安牧區", name: "泰安牧區聯合詩班", leader: "未提供", email: "", conductor: "未提供", pianist: "未提供", status: "pending" },
            { id: 10, zone: "中苗小區", note: "大甲溪牧區", name: "大甲溪牧區聯合詩班", leader: "張天仁", email: "", conductor: "李子寧", pianist: "湯亞昕 / 孫榮恩", status: "pending" },
            { id: 11, zone: "南投小區", note: "新望愛", name: "新望愛牧區長青聯合詩班", leader: "未提供", email: "", conductor: "田珍寶", pianist: "何燕萍", status: "pending" },
            { id: 12, zone: "南投小區", note: "親春線", name: "親春線牧區兒童聯合詩班", leader: "未提供", email: "", conductor: "未提供", pianist: "未提供", status: "pending" },
            { id: 13, zone: "南投小區", note: "力行線", name: "力行線牧區設清聯合詩班", leader: "楊凱琳", email: "", conductor: "田嘉燕", pianist: "陳崇儀", status: "pending" },
            { id: 14, zone: "教區大專", note: "大專聯契", name: "西大團契聯合詩班", leader: "未提供", email: "", conductor: "未提供", pianist: "未提供", status: "pending" },
            { id: 15, zone: "教區聯合", note: "中堅聯契", name: "西區教區中堅聯合詩班", leader: "未提供", email: "", conductor: "未提供", pianist: "未提供", status: "pending" },
            { id: 16, zone: "教區負責人", note: "長執同工", name: "西區傳道負責人聯合詩班", leader: "未提供", email: "", conductor: "未提供", pianist: "未提供", status: "pending" }
        ];

        let activeChoirId = null;

        // 3. 渲染左側名單
        function renderChoirList(data) {
            const listContainer = document.getElementById('choir-list');
            if (!listContainer) return;
            
            listContainer.innerHTML = '';
            data.forEach(c => {
                const isActive = activeChoirId === c.id;
                const statusBadge = c.status === 'submitted' 
                    ? '<span class="text-[9px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">已提交</span>' 
                    : '<span class="text-[9px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded-full font-bold">未提交</span>';

                const card = document.createElement('button');
                card.className = `w-full text-left p-4 rounded-2xl transition-all border flex items-center justify-between group ${isActive ? 'bg-indigo-50 border-indigo-400 shadow-sm' : 'bg-white border-slate-100 hover:border-slate-200'}`;
                card.onclick = () => selectChoir(c.id);
                card.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="mt-1.5 w-2.5 h-2.5 rounded-full shrink-0 ${getZoneColor(c.zone)}"></div>
                        <div>
                            <div class="text-sm font-black text-slate-800 leading-snug">${c.name}</div>
                            <div class="text-[10px] text-slate-400 font-bold mt-0.5">${c.zone} · ${c.note}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        ${statusBadge}
                        <svg class="w-4 h-4 text-slate-300 group-hover:text-indigo-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        // 小區視覺標記色
        function getZoneColor(zone) {
            if (zone === "復興小區") return "bg-amber-500";
            if (zone === "竹苗小區") return "bg-emerald-500";
            if (zone === "中苗小區") return "bg-purple-500";
            if (zone === "南投小區") return "bg-rose-500";
            return "bg-indigo-500"; // 教區
        }

        // 搜尋篩選功能
        function filterChoirs() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = choirs.filter(c => 
                c.name.toLowerCase().includes(term) || 
                c.zone.toLowerCase().includes(term) || 
                c.conductor.toLowerCase().includes(term) ||
                c.leader.toLowerCase().includes(term)
            );
            renderChoirList(filtered);
        }

        // 4. 點選詩班後更新右側詳細資訊面板
        function selectChoir(id) {
            activeChoirId = id;
            const choir = choirs.find(c => c.id === id);
            const detailPanel = document.getElementById('detail-panel');
            if (!choir || !detailPanel) return;

            // 重新繪製左側保持高亮
            filterChoirs();

            const isSubmitted = choir.status === 'submitted';

            detailPanel.className = "bg-white rounded-[2.5rem] shadow-xl border border-slate-100 p-8 flex-grow flex flex-col justify-between animate-in fade-in zoom-in duration-300";
            detailPanel.innerHTML = `
                <div class="space-y-6">
                    <!-- 詩班小區頭部 -->
                    <div class="flex justify-between items-start border-b border-slate-100 pb-5">
                        <div>
                            <span class="text-[10px] font-black uppercase text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full border border-indigo-100">${choir.zone}</span>
                            <h3 class="text-2xl font-black text-slate-900 mt-3 leading-tight">${choir.name}</h3>
                            <p class="text-xs text-slate-400 font-bold mt-1">所屬牧區：${choir.note}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-slate-300 block">STATUS</span>
                            <span class="text-xs font-black uppercase ${isSubmitted ? 'text-green-500' : 'text-amber-500'}">${isSubmitted ? '● 已上傳練詩影音' : '○ 影音待上傳'}</span>
                        </div>
                    </div>

                    <!-- 幹部名冊區 -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">班負責 / 聯絡員</span>
                            <span class="text-sm font-black text-slate-800">${choir.leader}</span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">指揮老師</span>
                            <span class="text-sm font-black text-slate-800">${choir.conductor}</span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">鋼琴伴奏</span>
                            <span class="text-sm font-black text-slate-800">${choir.pianist}</span>
                        </div>
                    </div>

                    <!-- 操作區 -->
                    <div class="bg-indigo-50/50 p-6 rounded-[2rem] border border-indigo-100/50 flex flex-col md:flex-row items-center gap-6">
                        <div class="flex-grow text-left space-y-2">
                            <h5 class="text-sm font-black text-indigo-950">練詩動態影音提交管道</h5>
                            <p class="text-xs text-indigo-900/70 leading-relaxed font-medium">請將練習時錄製的影音、文檔及老照片，整合至同一個資料夾，點擊右側按鈕即可提交至公關宣傳組雲端硬碟。</p>
                        </div>
                        <div class="shrink-0 flex flex-col items-center gap-2 bg-white p-3 rounded-2xl border border-indigo-100/80 shadow-md">
                            <!-- 真實 QR Code 對應該詩班的個別提交系統 (可模擬) -->
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=160&data=${encodeURIComponent('https://tjcdaxiinformation.github.io/TJC-West-Choir-Portal/upload?id=' + choir.id)}" class="w-20 h-20" alt="Submit QR" />
                            <span class="text-[8px] text-slate-400 font-black uppercase tracking-widest">掃描直接提交</span>
                        </div>
                    </div>
                </div>

                <!-- 送出按鈕 -->
                <div class="mt-8 pt-5 border-t border-slate-100 flex flex-col md:flex-row gap-3">
                    <button onclick="submitDemo(${choir.id})" class="flex-grow bg-slate-900 text-white py-4 px-6 rounded-2xl font-black text-xs hover:bg-indigo-600 transition-all flex items-center justify-center gap-2 shadow-lg active:scale-95">
                        <svg class="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                        開啟雲端硬碟直接上傳影音
                    </button>
                    ${!isSubmitted ? `
                        <button onclick="simulateUpload(${choir.id})" class="bg-emerald-600 text-white py-4 px-6 rounded-2xl font-black text-xs hover:bg-emerald-500 transition-all shadow-md active:scale-95 shrink-0">
                            模擬完成上傳
                        </button>
                    ` : `
                        <button class="bg-slate-100 text-slate-400 py-4 px-6 rounded-2xl font-black text-xs cursor-not-allowed shrink-0" disabled>
                            ✓ 感謝您已提交
                        </button>
                    `}
                </div>
            `;
        }

        // 模擬上傳完成 (展示看板狀態更新)
        function simulateUpload(id) {
            const choir = choirs.find(c => c.id === id);
            if (choir) {
                choir.status = 'submitted';
                selectChoir(id);
                updateStats();
            }
        }

        // 更新頂部看板數字
        function updateStats() {
            const submittedCount = choirs.filter(c => c.status === 'submitted').length;
            const pendingCount = choirs.length - submittedCount;
            document.getElementById('count-submitted').innerText = submittedCount;
            document.getElementById('count-pending').innerText = pendingCount;
        }

        // Demo上傳連結點擊
        function submitDemo(id) {
            // 在實際事工中，這裡可改為 Google Drive 收集夾網址
            window.open(`https://tjcdaxiinformation.github.io/TJC-West-History/`, '_blank');
        }

        // 頁面初始化
        renderChoirList(choirs);
        updateStats();
    </script>
</body>
</html>
