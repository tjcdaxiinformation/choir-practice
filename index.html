<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前山牧區聯合詩班獻詩曲目</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f1f5f9;
        }
        
        .serif {
            font-family: 'Noto Serif TC', serif;
        }

        .card-zoom {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card-zoom:hover {
            transform: scale(1.02);
        }

        .btn-part {
            @apply flex flex-col items-center justify-center p-5 rounded-2xl text-white transition-all duration-200 shadow-lg active:scale-90 hover:brightness-110;
        }

        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="pb-16">

    <!-- 頂部標題區 -->
    <header class="bg-gradient-to-br from-blue-900 via-indigo-900 to-purple-900 text-white py-14 px-6 text-center shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-3xl md:text-5xl font-bold mb-4 serif tracking-widest">前山牧區聯合詩班</h1>
            <p class="text-blue-100 text-lg md:text-xl font-light">獻詩曲目自主練習系統</p>
            <div class="mt-6 inline-flex items-center bg-white/10 backdrop-blur-md px-5 py-2 rounded-full text-sm border border-white/20">
                <i class="fas fa-music mr-2 animate-pulse"></i>
                點選各聲部按鈕連結至影片複習
            </div>
        </div>
        <!-- 裝飾背景 -->
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <i class="fas fa-notes-medical absolute -top-10 -left-10 text-9xl"></i>
            <i class="fas fa-clef absolute -bottom-10 -right-10 text-9xl rotate-12"></i>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-10 space-y-10">
        
        <!-- 第一首詩歌 -->
        <section class="card-zoom bg-white rounded-3xl p-8 shadow-xl border border-blue-50">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 border-b border-gray-100 pb-4">
                <div class="flex items-center">
                    <div class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-xl shadow-lg mr-4">1</div>
                    <div>
                        <h2 class="text-2xl md:text-3xl font-black text-gray-800 serif">讚美詩 370 首</h2>
                        <p class="text-blue-600 font-bold text-lg">主幫助我們</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-5">
                <a href="https://youtu.be/NHlQP3GaK1k?si=RAbs_lHtX7iaKVeZ" target="_blank" class="btn-part bg-gradient-to-br from-rose-400 to-rose-600">
                    <i class="fas fa-microphone-alt text-3xl mb-3"></i>
                    <span class="font-bold text-lg">女高音</span>
                    <span class="text-xs opacity-75 tracking-tighter mt-1">SOPRANO</span>
                </a>
                <a href="https://youtu.be/JMyaAtRuIqE?si=ByMf0G7BOEQx10zs" target="_blank" class="btn-part bg-gradient-to-br from-amber-400 to-orange-600">
                    <i class="fas fa-microphone-alt text-3xl mb-3"></i>
                    <span class="font-bold text-lg">女低音</span>
                    <span class="text-xs opacity-75 tracking-tighter mt-1">ALTO</span>
                </a>
                <a href="https://youtu.be/Qei3S0IJNqs?si=rTL_sFrnSKuIimTx" target="_blank" class="btn-part bg-gradient-to-br from-sky-400 to-blue-600">
                    <i class="fas fa-microphone-alt text-3xl mb-3"></i>
                    <span class="font-bold text-lg">男高音</span>
                    <span class="text-xs opacity-75 tracking-tighter mt-1">TENOR</span>
                </a>
                <a href="https://youtu.be/jOa7HGTtoLI?si=iX4XaVCLNfO2p50Yw" target="_blank" class="btn-part bg-gradient-to-br from-indigo-500 to-indigo-800">
                    <i class="fas fa-microphone-alt text-3xl mb-3"></i>
                    <span class="font-bold text-lg">男低音</span>
                    <span class="text-xs opacity-75 tracking-tighter mt-1">BASS</span>
                </a>
            </div>
        </section>

        <!-- 第二首詩歌 -->
        <section class="card-zoom bg-white rounded-3xl p-8 shadow-xl border border-purple-50">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 border-b border-gray-100 pb-4">
                <div class="flex items-center">
                    <div class="bg-purple-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-xl shadow-lg mr-4">2</div>
                    <div>
                        <h2 class="text-2xl md:text-3xl font-black text-gray-800 serif">讚美詩 130 首</h2>
                        <p class="text-purple-600 font-bold text-lg">你為什忙</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-5">
                <button onclick="showWaitMsg('女高音')" class="btn-part bg-gray-100 text-gray-400 border border-gray-200">
                    <i class="fas fa-video-slash text-3xl mb-3"></i>
                    <span class="font-bold text-lg text-gray-500">女高音</span>
                    <span class="text-xs opacity-75 mt-1 font-medium">更新中</span>
                </button>
                <button onclick="showWaitMsg('女低音')" class="btn-part bg-gray-100 text-gray-400 border border-gray-200">
                    <i class="fas fa-video-slash text-3xl mb-3"></i>
                    <span class="font-bold text-lg text-gray-500">女低音</span>
                    <span class="text-xs opacity-75 mt-1 font-medium">更新中</span>
                </button>
                <button onclick="showWaitMsg('男高音')" class="btn-part bg-gray-100 text-gray-400 border border-gray-200">
                    <i class="fas fa-video-slash text-3xl mb-3"></i>
                    <span class="font-bold text-lg text-gray-500">男高音</span>
                    <span class="text-xs opacity-75 mt-1 font-medium">更新中</span>
                </button>
                <button onclick="showWaitMsg('男低音')" class="btn-part bg-gray-100 text-gray-400 border border-gray-200">
                    <i class="fas fa-video-slash text-3xl mb-3"></i>
                    <span class="font-bold text-lg text-gray-500">男低音</span>
                    <span class="text-xs opacity-75 mt-1 font-medium">更新中</span>
                </button>
            </div>
        </section>

        <!-- 管理區 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-gradient-to-br from-emerald-500 to-teal-700 rounded-3xl p-8 text-white shadow-xl">
                <h3 class="text-xl font-bold mb-3 flex items-center serif">
                    <i class="fas fa-cloud-upload-alt mr-3"></i>
                    練習影片上傳
                </h3>
                <p class="text-emerald-100 text-sm mb-6 leading-relaxed">
                    供指揮、司琴參考，調整出最和諧、口唱心和讚美神的聲音。
                </p>
                <button onclick="document.getElementById('file-input').click()" class="w-full bg-white/20 hover:bg-white/30 backdrop-blur-sm border border-white/40 py-3 rounded-xl font-bold transition-all">
                    選擇檔案
                </button>
                <input type="file" id="file-input" class="hidden">
            </div>

            <div class="bg-slate-800 rounded-3xl p-8 text-white shadow-xl flex flex-col justify-center">
                <div class="flex items-center mb-4">
                    <div class="bg-amber-500 p-3 rounded-xl mr-4 text-2xl">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <h4 class="text-lg font-bold">溫馨提示</h4>
                </div>
                <p class="text-slate-400 text-sm italic">
                    「當用各樣的智慧，把基督的道理豐豐富富的存在心裡，用詩章、頌詞、靈歌，彼此教導，互相勸戒，口唱心和的讚美神。」
                </p>
            </div>
        </div>

    </main>

    <footer class="mt-16 text-center">
        <p class="text-gray-500 font-medium tracking-widest uppercase text-xs">前山牧區聯合詩班 © 練習專用</p>
    </footer>

    <!-- 通知元件 -->
    <div id="alert-box" class="fixed top-10 left-1/2 -translate-x-1/2 z-50 bg-white border-l-4 border-blue-500 p-4 shadow-2xl rounded-r-xl transition-all duration-300 opacity-0 pointer-events-none translate-y-[-20px]">
        <div class="flex items-center">
            <i class="fas fa-info-circle text-blue-500 mr-3 text-xl"></i>
            <span id="alert-text" class="text-gray-700 font-bold"></span>
        </div>
    </div>

    <script>
        function showWaitMsg(part) {
            const box = document.getElementById('alert-box');
            const text = document.getElementById('alert-text');
            text.innerText = `${part}練習影片尚未上傳，請稍候。`;
            box.classList.remove('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
            
            setTimeout(() => {
                box.classList.add('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
            }, 3000);
        }
    </script>
</body>
</html>
